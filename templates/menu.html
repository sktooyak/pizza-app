<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>Operation Pizzeria</h1>
        <p>Our Menu</p>
    </header>

    <nav>
        <a href="/">Home</a>
        <a href="/menu">Menu</a>
        <a href="/cart" class="cart-link">🛒 Cart ({{ cart_count }})</a>
        <a href="/order">Order</a>
        <a href="/orders">Orders</a>
    </nav>

    <main class="hero">
        <h2>Pizza Menu</h2>
        <p>Choose your favorite pizza.</p>
    </main>

    <section class="menu-container">
    <div class="pizza-card">
    <h3>Cheese Pizza</h3>
    <p class="description">Fresh mozzarella and tomato sauce</p>
    <p class="price">$10.99</p>

    <form action="/add_to_cart" method="POST">
        <input type="hidden" name="pizza_name" value="Cheese Pizza">
        <input type="hidden" name="price" value="10.99">
        <button type="submit">Add to Cart</button>
    </form>
</div>

<div class="pizza-card">
    <h3>Pepperoni Pizza</h3>
    <p class="description">Classic pepperoni and mozzarella cheese</p>
    <p class="price">$12.99</p>

    <form action="/add_to_cart" method="POST">
        <input type="hidden" name="pizza_name" value="Pepperoni Pizza">
        <input type="hidden" name="price" value="12.99">
        <button type="submit">Add to Cart</button>
    </form>
</div>

<div class="pizza-card">
    <h3>Veggie Pizza</h3>
    <p class="description">Loaded with fresh vegetables</p>
    <p class="price">$11.99</p>

    <form action="/add_to_cart" method="POST">
        <input type="hidden" name="pizza_name" value="Veggie Pizza">
        <input type="hidden" name="price" value="11.99">
        <button type="submit">Add to Cart</button>
    </form>
</div>
    </section>
</body> 
</html>

{% extends "base.html" %}

{% block content %}
    <main class="hero">
        <h2>Today's Deals</h2>
        <p>Check out our latest pizza specials and combo offers.</p>
    </main>

    <h2 class="menu-section-title">Featured Deals</h2>
    <section class="menu-container">
        {% for deal in deals %}
        <div class="pizza-card">
            <img src="{{ url_for('static', filename='images/' ~ deal.image) }}" alt="{{ deal.title }}">
            <h3>{{ deal.title }}</h3>
            <p class="description">{{ deal.description }}</p>
            <p class="price">${{ deal.price }}</p>

            <form action="/add_to_cart" method="POST">
                <input type="hidden" name="pizza_name" value="{{ deal.title }}">
                <input type="hidden" name="price" value="{{ deal.price }}">
                <button type="submit">Add to Cart</button>
            </form>
        </div>
        {% endfor %}
    </section>
{% endblock %}

{% extends "base.html" %}

{% block content %}
<div class="dashboard-container">
    <h2>Admin Dashboard</h2>
    <p>Welcome, {{ user["username"].capitalize() }}</p>


    <h3>Orders</h3>

    {% for order in orders %}
        <p>
            {{ order.customer_name.title() }} -
            {{ order.pizza_type }} -
            {{ order.order_type.title() }}
        </p>
    {% endfor %}

    <br>
    <a href="/logout">Logout</a>
</div>
{% endblock %}
